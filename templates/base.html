<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{{STATIC_URL}}css/style.css" rel="stylesheet" type="text/css"/>
        <style>
          body { padding-top: 60px; padding-bottom: 40px; }
        </style>
        {% block header %}{% endblock header %}
    </head>
    <body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="/">DW Graph</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            {% if year %}<li class="nav-item"><a class="nav-link{% if current_year == year %} active{% endif %}" href="/{{year}}">{{year}}</a></li>{% endif %}
            {% if archives %}
            <li class="nav-item dropdown">
              <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown" role="button" aria-expanded="false">Archive</a>
              <ul class="dropdown-menu">
              {% for y in archives reversed %}
                <li><a class="dropdown-item" href="/{{y}}">{{y}}</a></li>
              {% endfor %}
              </ul>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <section>
        <div class="content">
          {% block content %}{% endblock content %}
        </div>
      </section>
      <hr />
      <footer>
        <p class="text-muted">DW Graph by Will Abson</p>
      </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
